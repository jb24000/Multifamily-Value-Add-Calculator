<script>
  const els = Object.fromEntries(
    [...document.querySelectorAll("[id]")].map(el => [el.id, el])
  );

  const money0 = new Intl.NumberFormat(undefined, {
    style: "currency",
    currency: "USD",
    maximumFractionDigits: 0
  });

  const money2 = new Intl.NumberFormat(undefined, {
    style: "currency",
    currency: "USD",
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });

  const fmtMoney0 = (n) => Number.isFinite(n) ? money0.format(n) : "—";
  const fmtMoney2 = (n) => Number.isFinite(n) ? money2.format(n) : "—";
  const fmtPct2 = (n) => Number.isFinite(n) ? `${(n * 100).toFixed(2)}%` : "—";
  const fmtNum2 = (n) => Number.isFinite(n) ? n.toFixed(2) : "—";

  const num = (id, fallback = 0) => {
    const v = parseFloat(els[id]?.value);
    return Number.isFinite(v) ? v : fallback;
  };

  const clampMin = (value, min = 0) => Math.max(min, value);

  function setText(id, value) {
    if (els[id]) els[id].textContent = value;
  }

  function badge(id, text, tone = "") {
    const el = els[id];
    if (!el) return;
    el.textContent = text;
    el.className = `badge${tone ? ` ${tone}` : ""}`;
  }

  function toneByThreshold(value, goodMin, warnMin) {
    if (!Number.isFinite(value)) return "";
    if (value >= goodMin) return "good";
    if (value >= warnMin) return "warn";
    return "bad";
  }

  function calcNOI(units, rentPerUnit, otherIncomeMonthly, vacancyPct, expensePct) {
    const gprAnnual = units * rentPerUnit * 12;
    const otherAnnual = otherIncomeMonthly * 12;
    const gross = gprAnnual + otherAnnual;
    const egi = gross * (1 - vacancyPct);
    const expenses = egi * expensePct;
    const noi = egi - expenses;
    return { noi, gross, egi, expenses };
  }

  function pmt(rateAnnual, years, principal) {
    const r = rateAnnual / 12;
    const n = years * 12;
    if (!Number.isFinite(principal) || principal <= 0) return 0;
    if (r === 0) return principal / n;
    return (r * principal) / (1 - Math.pow(1 + r, -n));
  }

  function balanceAfterYears(rateAnnual, amortYears, principal, yearsHeld) {
    const r = rateAnnual / 12;
    const n = amortYears * 12;
    const k = Math.min(Math.max(0, yearsHeld * 12), n);

    if (!Number.isFinite(principal) || principal <= 0) return 0;
    if (r === 0) return principal * (1 - k / n);

    const payment = pmt(rateAnnual, amortYears, principal);
    return principal * Math.pow(1 + r, k) - payment * ((Math.pow(1 + r, k) - 1) / r);
  }

  function getState() {
    const units = clampMin(num("units", 1), 1);
    const purchase = clampMin(num("purchasePrice"));
    const currentRent = clampMin(num("currentRent"));
    const otherIncomeMonthly = clampMin(num("otherIncomeMonthly"));

    const rentMode = els.rentMode.value;
    const rentIncrease = num("rentIncrease");
    const targetRent = clampMin(num("targetRent"));
    const postRent = rentMode === "target"
      ? targetRent
      : clampMin(currentRent + rentIncrease);

    const noiMode = els.noiMode.value;

    const ltv = clampMin(num("ltvPct")) / 100;
    const rate = clampMin(num("ratePct")) / 100;
    const amortYears = clampMin(num("amortYears", 1), 1);
    const holdYears = clampMin(num("holdYears", 1), 1);
    const returnDebtMode = els.returnDebtMode.value;

    const exitCap = clampMin(num("exitCapPct")) / 100;
    const saleCostPct = clampMin(num("saleCostPct")) / 100;
    const capex = clampMin(num("capex"));

    return {
      units,
      purchase,
      currentRent,
      otherIncomeMonthly,
      rentMode,
      rentIncrease,
      targetRent,
      postRent,
      noiMode,
      ltv,
      rate,
      amortYears,
      holdYears,
      returnDebtMode,
      exitCap,
      saleCostPct,
      capex
    };
  }

  function compute(state) {
    const {
      units, purchase, currentRent, otherIncomeMonthly, postRent, noiMode,
      ltv, rate, amortYears, holdYears, returnDebtMode,
      exitCap, saleCostPct, capex
    } = state;

    const pricePerUnit = purchase / units;
    const loan = purchase * ltv;
    const equity = purchase - loan;
    const totalEquity = equity + capex;

    let noiIn = NaN;
    let noiStab = NaN;
    let vacancyUsed = 0;
    let expenseUsed = 0;

    if (noiMode === "quick") {
      vacancyUsed = clampMin(num("vacancyPct")) / 100;
      expenseUsed = clampMin(num("expensePct")) / 100;
      noiIn = calcNOI(units, currentRent, otherIncomeMonthly, vacancyUsed, expenseUsed).noi;
      noiStab = calcNOI(units, postRent, otherIncomeMonthly, vacancyUsed, expenseUsed).noi;
    } else {
      noiIn = num("inPlaceNOIAnnual");
      vacancyUsed = clampMin(num("vacancyPctT12")) / 100;
      expenseUsed = clampMin(num("expensePctT12")) / 100;
      noiStab = calcNOI(units, postRent, otherIncomeMonthly, vacancyUsed, expenseUsed).noi;
    }

    const noiInc = noiStab - noiIn;
    const noiGrowth = noiIn !== 0 ? noiInc / noiIn : NaN;

    const projValue = exitCap > 0 ? noiStab / exitCap : NaN;
    const valueInc = exitCap > 0 ? noiInc / exitCap : NaN;

    const annualPI = pmt(rate, amortYears, loan) * 12;
    const annualIO = loan * rate;

    const dscrPI = annualPI > 0 ? noiIn / annualPI : NaN;
    const dscrIO = annualIO > 0 ? noiIn / annualIO : NaN;

    const saleCosts = Number.isFinite(projValue) ? projValue * saleCostPct : NaN;
    const balAtSale = balanceAfterYears(rate, amortYears, loan, holdYears);
    const netProceeds = Number.isFinite(projValue) ? projValue - saleCosts - balAtSale : NaN;

    const annualDebtForReturns = returnDebtMode === "io" ? annualIO : annualPI;
    const annualCashFlow = noiStab - annualDebtForReturns;
    const cumulativeCashFlow = annualCashFlow * holdYears;

    const totalReturn = netProceeds + cumulativeCashFlow;
    const equityMultiple = totalEquity > 0 ? totalReturn / totalEquity : NaN;
    const avgAnnual = Number.isFinite(equityMultiple) && equityMultiple > 0
      ? Math.pow(equityMultiple, 1 / holdYears) - 1
      : NaN;

    const monthlyLift = (postRent - currentRent) * units;

    return {
      pricePerUnit,
      loan,
      equity,
      totalEquity,
      postRent,
      monthlyLift,
      noiIn,
      noiStab,
      noiInc,
      noiGrowth,
      projValue,
      valueInc,
      annualPI,
      annualIO,
      dscrPI,
      dscrIO,
      saleCosts,
      balAtSale,
      netProceeds,
      annualCashFlow,
      cumulativeCashFlow,
      equityMultiple,
      avgAnnual,
      holdYears,
      exitCap,
      ltv,
      rate
    };
  }

  function syncUI() {
    const noiMode = els.noiMode.value;
    els.quickNOIInputs.style.display = noiMode === "quick" ? "block" : "none";
    els.t12NOIInputs.style.display = noiMode === "t12" ? "block" : "none";

    const rentMode = els.rentMode.value;
    els.rowIncrease.style.display = rentMode === "increase" ? "grid" : "none";
    els.rowTarget.style.display = rentMode === "target" ? "grid" : "none";
  }

  function render(r) {
    setText("outPricePerUnit", fmtMoney0(r.pricePerUnit));
    setText("outLoan", fmtMoney0(r.loan));
    setText("outPostRent", fmtMoney2(r.postRent));
    setText("outMonthlyLift", `${fmtMoney0(r.monthlyLift)} / mo`);

    setText("outNOIInPlace", fmtMoney0(r.noiIn));
    setText("outNOIStabilized", fmtMoney0(r.noiStab));
    setText("outNOIInc", fmtMoney0(r.noiInc));
    setText("outNOIGrowth", Number.isFinite(r.noiGrowth) ? fmtPct2(r.noiGrowth) : "—");

    setText("outProjValue", fmtMoney0(r.projValue));
    setText("outValueInc", fmtMoney0(r.valueInc));
    setText("outNetProceeds", fmtMoney0(r.netProceeds));
    setText("outCashFlow", fmtMoney0(r.annualCashFlow));

    setText(
      "outEquityMultiple",
      Number.isFinite(r.equityMultiple) ? `${fmtNum2(r.equityMultiple)}×` : "—"
    );
    setText("outAvgAnnual", Number.isFinite(r.avgAnnual) ? fmtPct2(r.avgAnnual) : "—");

    badge("outDSCR_PI", Number.isFinite(r.dscrPI) ? fmtNum2(r.dscrPI) : "—", toneByThreshold(r.dscrPI, 1.25, 1.10));
    badge("outDSCR_IO", Number.isFinite(r.dscrIO) ? fmtNum2(r.dscrIO) : "—", toneByThreshold(r.dscrIO, 1.25, 1.10));
    badge("outDebtPI", `${fmtMoney0(r.annualPI)} / yr`);
    badge("outDebtIO", `${fmtMoney0(r.annualIO)} / yr`);
    badge("outLTV", `${(r.ltv * 100).toFixed(0)}%`);
    badge("outRate", `${(r.rate * 100).toFixed(2)}%`);

    badge("outNOITakeover", fmtMoney0(r.noiIn));
    badge("outNOIMarket", fmtMoney0(r.noiStab));
    badge(
      "outNOIGrowthBadge",
      Number.isFinite(r.noiGrowth) ? fmtPct2(r.noiGrowth) : "—",
      toneByThreshold(r.noiGrowth, 0.25, 0.10)
    );

    badge("outProjValueBadge", fmtMoney0(r.projValue));
    badge("outSaleCosts", fmtMoney0(r.saleCosts));
    badge("outBalAtSale", fmtMoney0(r.balAtSale));
    badge("outNetProceedsBadge", fmtMoney0(r.netProceeds));

    badge("outTotalEquity", fmtMoney0(r.totalEquity));
    badge(
      "outEquityMultipleBadge",
      Number.isFinite(r.equityMultiple) ? `${fmtNum2(r.equityMultiple)}×` : "—",
      toneByThreshold(r.equityMultiple, 2.0, 1.5)
    );
    badge(
      "outAvgAnnualBadge",
      Number.isFinite(r.avgAnnual) ? fmtPct2(r.avgAnnual) : "—",
      toneByThreshold(r.avgAnnual, 0.18, 0.12)
    );

    const verdict = [];

    if (!Number.isFinite(r.projValue)) {
      verdict.push("Enter an Exit Cap to compute projected value.");
    }

    if (!Number.isFinite(r.noiIn) || !Number.isFinite(r.noiStab)) {
      verdict.push("Check NOI inputs.");
    }

    if (Number.isFinite(r.noiInc)) {
      if (r.noiInc > 0) {
        verdict.push(
          `Value-add indicated: NOI +${fmtMoney0(r.noiInc)} / yr ⇒ ~${fmtMoney0(r.valueInc)} value lift at ${(r.exitCap * 100).toFixed(2)}% cap.`
        );
      } else {
        verdict.push("No value-add: Stabilized NOI does not exceed in-place NOI.");
      }
    }

    if (Number.isFinite(r.dscrPI)) {
      verdict.push(`DSCR (P&I) is ${fmtNum2(r.dscrPI)} (target ≥ 1.25).`);
    }

    if (Number.isFinite(r.equityMultiple) && Number.isFinite(r.avgAnnual)) {
      verdict.push(
        `Projected returns: ${fmtNum2(r.equityMultiple)}× equity multiple, ${fmtPct2(r.avgAnnual)} avg annual return over ${r.holdYears} yrs.`
      );
    }

    setText("outVerdict", verdict.join(" "));
  }

  function recalc() {
    syncUI();
    const state = getState();
    const result = compute(state);
    render(result);
  }

  let rafId = null;
  function scheduleRecalc() {
    if (rafId !== null) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(() => {
      rafId = null;
      recalc();
    });
  }

  document.querySelectorAll("input, select").forEach(el => {
    el.addEventListener("input", scheduleRecalc, { passive: true });
    el.addEventListener("change", scheduleRecalc, { passive: true });
  });

  recalc();
</script>
